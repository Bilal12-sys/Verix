<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MaintainIQ - Asset Details</title>
    <link rel="shortcut icon" href="images/Logo.png" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, system-ui, sans-serif;
        }

        :root {
            --primary: #4169E1;
            --primary2: #6C8DFF;
            --bg: #F3F7FF;
            --text: #1E293B;
            --text2: #64748B;
        }

        body {
            background: linear-gradient(135deg, #F8FAFF, #EAF2FF);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(65, 105, 225, .14) 1px, transparent 1px),
                linear-gradient(90deg, rgba(65, 105, 225, .14) 1px, transparent 1px);
            background-size: 45px 45px;
            opacity: .4;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .header img {
            height: 50px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: rgba(248, 250, 255, .75);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(65, 105, 225, .15);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 10px 30px rgba(65, 105, 225, .1);
            margin-bottom: 24px;
        }

        .asset-info {
            margin-bottom: 24px;
        }

        .asset-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
        }

        .asset-code {
            display: inline-block;
            background: rgba(65, 105, 225, .08);
            color: var(--primary);
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .asset-status {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 8px;
        }

        .asset-status.operational {
            background: rgba(34, 197, 94, .1);
            color: #16a34a;
        }

        .asset-status.issue-reported {
            background: rgba(245, 158, 11, .1);
            color: #d97706;
        }

        .asset-details {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(65, 105, 225, .1);
        }

        .detail-item:last-child {
            border-bottom: none;
        }

        .detail-label {
            font-weight: 600;
            color: var(--text2);
        }

        .detail-value {
            color: var(--text);
        }

        .history-section {
            margin-top: 24px;
        }

        .history-section h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .history-timeline {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            position: relative;
            padding-left: 24px;
            padding-bottom: 12px;
        }

        .history-item::before {
            content: '';
            position: absolute;
            left: 4px;
            top: 0;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
        }

        .history-item::after {
            content: '';
            position: absolute;
            left: 7px;
            top: 8px;
            width: 2px;
            height: calc(100% + 4px);
            background: rgba(65, 105, 225, .2);
        }

        .history-item:last-child::after {
            display: none;
        }

        .history-text {
            font-size: 13px;
            color: var(--text2);
        }

        .button {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all .3s ease;
            text-decoration: none;
            text-align: center;
        }

        .button-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary2));
            color: white;
            box-shadow: 0 12px 25px rgba(65, 105, 225, .28);
            width: 100%;
            margin-top: 16px;
        }

        .button-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 35px rgba(65, 105, 225, .35);
        }

        .button-secondary {
            background: rgba(255, 255, 255, .75);
            color: var(--text);
            border: 1px solid rgba(65, 105, 225, .15);
            margin-top: 12px;
            width: 100%;
        }

        .button-secondary:hover {
            background: white;
            border-color: var(--primary);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text2);
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 16px;
            color: var(--text2);
        }

        form {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input, textarea, select {
            padding: 12px 14px;
            border: 1px solid rgba(65, 105, 225, .18);
            border-radius: 10px;
            background: rgba(255, 255, 255, .6);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            transition: all .3s ease;
        }

        input:focus, textarea:focus, select:focus {
            background: white;
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(65, 105, 225, .08), 0 10px 25px rgba(65, 105, 225, .15);
        }

        label {
            font-weight: 600;
            font-size: 13px;
            color: var(--text);
            margin-top: 8px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .not-found {
            text-align: center;
            padding: 60px 20px;
            color: var(--text2);
        }

        .not-found h2 {
            font-size: 28px;
            margin-bottom: 12px;
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div class="container">
        <div class="header">
            <img src="images/Logo.png" alt="MaintainIQ">
            <h1>MaintainIQ</h1>
        </div>

        <div id="loadingState" class="loading" style="display:none;">
            Loading asset information...
        </div>

        <div id="notFoundState" class="not-found" style="display:none;">
            <h2>Asset Not Found</h2>
            <p>The asset you're looking for doesn't exist or has been removed.</p>
        </div>

        <div id="assetContent" style="display:none;">
            <div class="card">
                <div class="asset-info">
                    <div class="asset-name" id="assetName"></div>
                    <div>
                        <span class="asset-code" id="assetCode"></span>
                        <span class="asset-status" id="assetStatus"></span>
                    </div>
                </div>

                <div class="asset-details">
                    <div class="detail-item">
                        <span class="detail-label">Category</span>
                        <span class="detail-value" id="assetCategory"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Location</span>
                        <span class="detail-value" id="assetLocation"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Condition</span>
                        <span class="detail-value" id="assetCondition"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Last Service</span>
                        <span class="detail-value" id="assetLastService"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Next Service</span>
                        <span class="detail-value" id="assetNextService"></span>
                    </div>
                </div>

                <div id="historySection" class="history-section" style="display:none;">
                    <h3>Recent Activity</h3>
                    <div class="history-timeline" id="historyTimeline"></div>
                </div>

                <form id="issueForm">
                    <h3>Report an Issue</h3>
                    <div class="form-group">
                        <label for="issueTitle">Issue Title *</label>
                        <input type="text" id="issueTitle" required>
                    </div>
                    <div class="form-group">
                        <label for="issueDescription">Description *</label>
                        <textarea id="issueDescription" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="issuePriority">Priority *</label>
                        <select id="issuePriority" required>
                            <option value="Low">Low</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="High">High</option>
                            <option value="Critical">Critical</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="reporterName">Your Name</label>
                        <input type="text" id="reporterName">
                    </div>
                    <div class="form-group">
                        <label for="reporterContact">Your Contact (Email/Phone)</label>
                        <input type="text" id="reporterContact">
                    </div>
                    <button type="submit" class="button button-primary">Submit Issue Report</button>
                </form>
            </div>

            <p style="text-align: center; color: var(--text2); font-size: 12px;">
                All reports are securely stored and will be reviewed by maintenance staff.
            </p>
        </div>
    </div>

    <script type="module">
        import {
            db,
            collection,
            query,
            where,
            getDocs,
            addDoc,
            serverTimestamp
        } from "./config/firebase.js";

        let currentAsset = null;

        document.addEventListener("DOMContentLoaded", async () => {
            const params = new URLSearchParams(window.location.search);
            const assetCode = params.get("code");

            if (!assetCode) {
                showNotFound();
                return;
            }

            showLoading();
            await loadAsset(assetCode);
        });

        async function loadAsset(code) {
            try {
                const q = query(
                    collection(db, "assets"),
                    where("code", "==", code)
                );
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    showNotFound();
                    return;
                }

                currentAsset = { id: snapshot.docs[0].id, ...snapshot.docs[0].data() };
                displayAsset();
                setupIssueForm();
            } catch (error) {
                console.error("Error loading asset:", error);
                showNotFound();
            }
        }

        function displayAsset() {
            document.getElementById("loadingState").style.display = "none";
            document.getElementById("assetContent").style.display = "block";

            document.getElementById("assetName").textContent = currentAsset.name;
            document.getElementById("assetCode").textContent = currentAsset.code;
            document.getElementById("assetCategory").textContent = currentAsset.category;
            document.getElementById("assetLocation").textContent = currentAsset.location;
            document.getElementById("assetCondition").textContent = currentAsset.condition;
            document.getElementById("assetLastService").textContent = currentAsset.lastServiceDate || "Not recorded";
            document.getElementById("assetNextService").textContent = currentAsset.nextServiceDate || "Not scheduled";

            const statusEl = document.getElementById("assetStatus");
            statusEl.textContent = currentAsset.status;
            statusEl.className = `asset-status ${currentAsset.status.toLowerCase().replace(/\s+/g, '-')}`;
        }

        function setupIssueForm() {
            document.getElementById("issueForm").addEventListener("submit", async (e) => {
                e.preventDefault();

                const issueData = {
                    assetId: currentAsset.id,
                    assetCode: currentAsset.code,
                    assetName: currentAsset.name,
                    title: document.getElementById("issueTitle").value,
                    description: document.getElementById("issueDescription").value,
                    priority: document.getElementById("issuePriority").value,
                    reporterName: document.getElementById("reporterName").value,
                    reporterContact: document.getElementById("reporterContact").value,
                    status: "Reported",
                    createdAt: serverTimestamp()
                };

                try {
                    await addDoc(collection(db, "issues"), issueData);
                    showNotification("Issue reported successfully! Our team will review it shortly.");
                    document.getElementById("issueForm").reset();
                } catch (error) {
                    showNotification("Error submitting report. Please try again.");
                    console.error(error);
                }
            });
        }

        function showLoading() {
            document.getElementById("loadingState").style.display = "block";
            document.getElementById("assetContent").style.display = "none";
            document.getElementById("notFoundState").style.display = "none";
        }

        function showNotFound() {
            document.getElementById("loadingState").style.display = "none";
            document.getElementById("assetContent").style.display = "none";
            document.getElementById("notFoundState").style.display = "block";
        }

        function showNotification(message) {
            alert(message);
        }

        window.displayAsset = displayAsset;
    </script>
</body>
</html>
